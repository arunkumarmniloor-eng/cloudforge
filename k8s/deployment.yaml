apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudforge-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudforge

  template:
    metadata:
      labels:
        app: cloudforge

    spec:
      containers:
      - name: cloudforge-container
        image: dockerhubusername/cloudforge-app
        ports:
        - containerPort: 80